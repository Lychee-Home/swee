name: CI

on:
  push:
    branches: [main]
    paths:
      - main.py
      - requirements.txt

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest and restart service
        env:
          SWEE_DIR: ${{ vars.SWEE_DIR }}
          SWEE_USER: ${{ vars.SWEE_USER }}
        run: |
          set -euo pipefail
          : "${SWEE_DIR:?SWEE_DIR repo variable must be set}"
          if [ -n "${SWEE_USER:-}" ]; then
            sudo -u "$SWEE_USER" -H "$SWEE_DIR/deploy/ci-deploy.sh"
          else
            cd "$SWEE_DIR"
            git pull --ff-only origin main
            .venv/bin/pip install -q -r requirements.txt
          fi
          sudo systemctl restart swee

  release:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine release
        id: release
        run: |
          latest_tag="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          subject="$(git log -1 --format=%s)"
          body="$(git log -1 --format=%b)"
          COMMIT_SUBJECT="$subject" COMMIT_BODY="$body" LATEST_TAG="$latest_tag" \
            bash scripts/compute-version-bump.sh >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        if: steps.release.outputs.level != 'none'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          tag="${{ steps.release.outputs.tag }}"
          git tag -a "$tag" -m "$tag"
          git push origin "$tag"
          gh release create "$tag" --generate-notes
